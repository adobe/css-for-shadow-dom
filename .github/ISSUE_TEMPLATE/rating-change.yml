name: Rating Change Proposal
description: Propose a change to a feature's support rating
title: '[Rating Change] '
labels: ['rating-review']
body:
  - type: checkboxes
    id: code_of_conduct
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [code of conduct](https://github.com/adobe/spectrum-web-components/blob/main/CODE_OF_CONDUCT.md#adobe-code-of-conduct).
      options:
        - label: I agree to follow this project's code of conduct.
          required: true
  - type: checkboxes
    id: cla
    attributes:
      label: Contributor License Agreement
      description: First-time Adobe contributor? [Signing our CLA](https://opensource.adobe.com/cla.html) is a requirement for accepting your contribution.
      options:
        - label: I have signed the CLA.
          required: true
  - type: input
    id: feature
    attributes:
      label: Feature Name
      placeholder: e.g., @property
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Proposed Rating
      description: What is the current rating and what do you believe it should change to?
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: Supporting Evidence
      description: Include WPT links, browser versions tested, repro cases, spec links, or issue references.
      placeholder: |
        - WPT:
        - Browser version(s):
        - Spec:
        - CSSWG issue:
        - Browser bug:
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Any nuance, edge cases, or implementation notes.
